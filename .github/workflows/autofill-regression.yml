name: autofill-regression

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test -- tests/unit/autofill.test.ts
      - name: Snapshot fixtures (optional)
        run: |
          if [ ! -d tests/fixtures/autofill ]; then
            echo "No HTML fixtures yet — skipping snapshot regression (scaffold)."
            exit 0
          fi
          npm test -- tests/autofill-regression
