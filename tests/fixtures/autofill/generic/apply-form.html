<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Careers — Apply — Acme Robotics</title>
  </head>
  <body>
    <main>
      <h1>Apply for Product Designer</h1>
      <p>Acme Robotics · Remote</p>
      <form id="careers-apply">
        <div class="field">
          <label for="candidate-name">Full name</label>
          <input id="candidate-name" name="full_name" type="text" placeholder="Jane Doe" autocomplete="name" />
        </div>

        <div class="field">
          <label for="candidate-email">Email</label>
          <input id="candidate-email" name="email" type="email" autocomplete="email" />
        </div>

        <div class="field">
          <label for="candidate-phone">Phone</label>
          <input id="candidate-phone" name="phone" type="tel" autocomplete="tel" />
        </div>

        <div class="field">
          <label for="candidate-linkedin">LinkedIn</label>
          <input id="candidate-linkedin" name="linkedin" type="url" />
        </div>

        <div class="field">
          <label for="candidate-work-auth">Are you legally authorized to work in this country?</label>
          <input id="candidate-work-auth" name="work_authorization" type="text" />
        </div>

        <div class="field">
          <label for="candidate-resume">Resume file</label>
          <input id="candidate-resume" name="resume" type="file" accept=".pdf,.doc,.docx" />
        </div>

        <button type="submit">Submit application</button>
      </form>
    </main>
  </body>
</html>
