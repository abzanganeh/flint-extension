<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Careers — Apply — Acme Robotics</title>
  </head>
  <body>
    <main>
      <h1>Apply for Product Designer</h1>
      <p>Acme Robotics · Remote</p>
      <form id="careers-apply">
        <div class="field">
          <label for="candidate-name">Full Name</label>
          <input id="candidate-name" placeholder="Jane Doe" />
        </div>

        <div class="field">
          <label for="candidate-email">Email address</label>
          <input id="candidate-email" type="email" />
        </div>

        <div class="field">
          <label for="candidate-phone">Phone number</label>
          <input id="candidate-phone" type="tel" />
        </div>

        <div class="field">
          <label for="candidate-linkedin">LinkedIn profile URL</label>
          <input id="candidate-linkedin" type="url" />
        </div>

        <div class="field">
          <label for="candidate-work-auth">Are you legally authorized to work in this country?</label>
          <input id="candidate-work-auth" type="text" />
        </div>

        <div class="field">
          <label for="candidate-resume">Upload your resume</label>
          <input id="candidate-resume" type="file" accept=".pdf,.doc,.docx" />
        </div>

        <button type="submit">Submit application</button>
      </form>
    </main>
  </body>
</html>
