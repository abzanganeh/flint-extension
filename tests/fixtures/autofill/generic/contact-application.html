<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Careers — Apply — Northwind Labs</title>
  </head>
  <body>
    <main>
      <h1>Apply for Software Engineer</h1>
      <p>Northwind Labs · Hybrid</p>
      <form id="application-form" action="#" method="post">
        <div class="field">
          <label for="full_name">Full name</label>
          <input id="full_name" name="full_name" type="text" autocomplete="name" />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" />
        </div>

        <div class="field">
          <label for="phone">Phone</label>
          <input id="phone" name="phone" type="tel" autocomplete="tel" />
        </div>

        <div class="field">
          <label for="linkedin">LinkedIn</label>
          <input id="linkedin" name="linkedin" type="url" placeholder="https://www.linkedin.com/in/…" />
        </div>

        <div class="field">
          <label for="resume">Resume file</label>
          <input id="resume" name="resume" type="file" accept=".pdf,.doc,.docx" />
        </div>

        <button type="submit">Submit application</button>
      </form>
    </main>
  </body>
</html>
