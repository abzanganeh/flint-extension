<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Apply — Senior Software Engineer — Example Co</title>
  </head>
  <body>
    <main>
      <h1>Senior Software Engineer</h1>
      <p>Example Co · Remote</p>
      <form id="application_form" action="/applications" method="post">
        <fieldset>
          <legend>Personal information</legend>
          <label for="first_name">First Name</label>
          <input
            id="first_name"
            name="job_application[first_name]"
            type="text"
            autocomplete="given-name"
            required
          />

          <label for="last_name">Last Name</label>
          <input
            id="last_name"
            name="job_application[last_name]"
            type="text"
            autocomplete="family-name"
            required
          />

          <label for="email">Email</label>
          <input
            id="email"
            name="job_application[email]"
            type="email"
            autocomplete="email"
            required
          />

          <label for="phone">Phone</label>
          <input
            id="phone"
            name="job_application[phone]"
            type="tel"
            autocomplete="tel"
          />
        </fieldset>

        <fieldset>
          <legend>Resume</legend>
          <label for="resume">Attach resume</label>
          <input id="resume" name="job_application[resume]" type="file" accept=".pdf,.doc,.docx" />
        </fieldset>

        <fieldset>
          <legend>Links</legend>
          <label for="linkedin">LinkedIn profile</label>
          <input
            id="linkedin"
            name="job_application[urls][LinkedIn]"
            type="url"
            placeholder="https://www.linkedin.com/in/you"
          />
        </fieldset>

        <fieldset>
          <legend>Work authorization</legend>
          <label for="work_auth">Are you authorized to work in the United States?</label>
          <select id="work_auth" name="job_application[answers][work_authorization]">
            <option value="">Select…</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
          </select>
        </fieldset>

        <button type="submit" id="submit_app">Submit application</button>
      </form>
    </main>
  </body>
</html>
